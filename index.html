<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GracePulse</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div style="font-weight: 600; color: var(--primary-light);">טוען נתונים...</div>
  </div>

  <header class="sticky-header">
    <div class="header-top">
      <h1><i class="fa-solid fa-house-chimney" style="margin-left: 0.5rem;"></i> GracePulse</h1>
      <div id="prime-rate-display" style="font-size: 0.8rem; background: rgba(0,0,0,0.2); padding: 0.2rem 0.6rem; border-radius: 12px;">
        פריים: <span id="current-prime">--</span>%
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-box">
        <div class="stat-label">יתרת נזילות נוכחית</div>
        <div class="stat-value" id="liquid-balance">-- ₪</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">נותר לשלם לקבלן</div>
        <div class="stat-value" id="remaining-contractor">-- ₪</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">יתרה סופית צפויה</div>
        <div class="stat-value" id="projected-final">-- ₪</div>
      </div>
    </div>
  </header>

  <main class="container">

    <h2 class="section-title">התקדמות מסלולים</h2>
    <div class="tracks-card" id="tracks-container">
      </div>

    <h2 class="section-title">פירוט חודשי (גרייס)</h2>
    <div class="ledger-list" id="ledger-container">
      </div>

  </main>

  <div id="toast">הודעה...</div>

  <div id="index-guard-overlay" class="bottom-sheet-overlay hidden" onclick="closeIndexGuardSheet()"></div>
  <div id="index-guard-sheet" class="bottom-sheet hidden">
    <div class="bottom-sheet-header">
      <div class="bottom-sheet-title"><i class="fa-solid fa-chart-line"></i> הצמדה למדד (IndexGuard)</div>
      <button class="close-btn" onclick="closeIndexGuardSheet()"><i class="fa-solid fa-times"></i></button>
    </div>
    
    <div class="ig-input-group">
      <label for="ig-principal-amount">סכום תשלום קרוב (קרן)</label>
      <input type="number" id="ig-principal-amount" step="1" oninput="calculateIndexGuardDelta()">
    </div>
    <div class="ig-input-group">
      <label for="ig-current-index">המדד הנוכחי</label>
      <input type="number" id="ig-current-index" step="0.1" placeholder="לדוגמה: 131.2" oninput="calculateIndexGuardDelta()">
    </div>

    <div class="ig-comparison-table">
      <div class="ig-table-row">
        <span class="ig-table-label">עלות משכנתא חוקית</span>
        <span class="ig-table-value" id="ig-legal-charge">0 ₪</span>
      </div>
      <div class="ig-table-row">
        <span class="ig-table-label">עלות משכנתא קבלן</span>
        <span class="ig-table-value" id="ig-contractor-charge">0 ₪</span>
      </div>
      <div class="ig-table-row ig-delta-row">
        <div>
          <div class="ig-delta-label">הפרש (Contractor - Legal)</div>
          <div class="ig-delta-value" id="ig-delta-display">0 ₪</div>
        </div>
      </div>
    </div>

    <button class="btn-ig-approve" id="btn-ig-approve" onclick="approveIndexLinkage()" disabled>
      <i class="fa-solid fa-check"></i> אשר והוסף לחוב
    </button>
  </div>

  <script src="js/app.js"></script>
  <script src="js/index_guard.js"></script>
</body>
</html>
